name: Python smoke

# Quick build of the pybind11 module against the BALL C++ tree, plus
# the python/tests smoke suite. Designed to catch BALL-side C++
# changes that break the binding ABI before they ship — runs on every
# push and PR that touches the Python tree, BALL source under source/
# or include/, or the build wiring itself.
#
# This workflow does NOT publish wheels; that lives in
# build-wheels.yml on tag push. The smoke is meant to be cheap and
# fast (~10–15 min) so contributors get feedback on every change.

on:
  push:
    branches: [zomball, master, "pybind11-bindings"]
    paths:
      - "python/**"
      - "source/**"
      - "include/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - ".github/workflows/python-smoke.yml"
  pull_request:
    paths:
      - "python/**"
      - "source/**"
      - "include/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - ".github/workflows/python-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Build + smoke (ubuntu-22.04, py${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        # Qt6 + Boost + Eigen + FFTW are BALL's hard deps (the zomball
        # branch's modernization commits explicitly target Qt6). Package
        # names follow Ubuntu 22.04 (jammy) — `qt6-base-dev` not
        # `libqt6base-dev`, the latter does not exist on jammy.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake \
              qt6-base-dev libqt6core5compat6-dev qt6-tools-dev qt6-tools-dev-tools \
              libboost-all-dev \
              libeigen3-dev \
              libfftw3-dev

      - name: Install Python build helpers
        run: python -m pip install --upgrade pip pytest

      - name: Configure (-DBALL_BUILD_PYTHON=ON)
        run: |
          mkdir -p build
          cd build
          cmake .. \
              -DBALL_BUILD_PYTHON=ON \
              -DBUILD_TESTING=OFF \
              -DCMAKE_BUILD_TYPE=Release

      - name: Build BALL + ball_py module
        run: cmake --build build -j$(nproc)

      - name: Run python smoke tests
        # Tests look for 1crn.pdb in BALL_TEST_CRAMBIN -> proteon
        # repo path -> repo's own data/. Set the env-var explicitly
        # to BALL's bundled test fixture if one is shipped here, and
        # otherwise let the smoke skip rather than fail. The shape
        # checks (import, dict keys, exception lifting) always run.
        env:
          PYTHONPATH: ${{ github.workspace }}/build/python
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/lib
          BALL_DATA_PATH: ${{ github.workspace }}/data
        run: |
          if [ -f "${GITHUB_WORKSPACE}/test/data/1crn.pdb" ]; then
            export BALL_TEST_CRAMBIN="${GITHUB_WORKSPACE}/test/data/1crn.pdb"
          fi
          python -m pytest python/tests -v
